name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:

  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create PostgreSQL databases
        run: |
          sleep 3
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE student_db;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE course_db;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE enrollement_db;"

      - name: Build and test all modules
        run: mvn clean package -DskipTests=false
        env:
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 2163

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            eureka-server/target/*.jar
            gateway-service/target/*.jar
            student-service/target/*.jar
            course-service/target/*.jar
            enrollement-service/target/*.jar
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: enrollment-front

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: enrollment-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: enrollment-front/dist/
          if-no-files-found: warn

  docker:
    needs: [ backend, frontend ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: jars

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: enrollment-front/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}

          # Backend services
          for SERVICE in eureka-server gateway-service student-service course-service enrollement-service; do
            cp -f jars/${SERVICE}-*.jar docker/${SERVICE}/app.jar
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ${{ secrets.DOCKER_USERNAME }}/enrollment-${SERVICE}:latest \
              --tag ${{ secrets.DOCKER_USERNAME }}/enrollment-${SERVICE}:${IMAGE_TAG} \
              --push \
              docker/${SERVICE}/
          done

          # Frontend
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${{ secrets.DOCKER_USERNAME }}/enrollment-frontend:latest \
            --tag ${{ secrets.DOCKER_USERNAME }}/enrollment-frontend:${IMAGE_TAG} \
            --push \
            docker/enrollment-front/
